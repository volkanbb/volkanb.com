services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: SaaS_Portfolio
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d SaaS_Portfolio"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    restart: always

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=SaaS_Portfolio;Username=postgres;Password=supersecretpassword
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
    expose:
      - 8080
    depends_on:
      db:
        condition: service_started
    volumes:
      - uploads_data:/app/wwwroot/uploads
    labels:
      - "coolify.managed=true"
      - "traefik.http.services.api.loadbalancer.server.port=8080"

  reservation-api:
    build:
      context: ./Apps/ReserveLink
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://postgres:supersecretpassword@db:5432/reservation_db
      - JWT_SECRET_KEY=super-secret-key-change-it
      - SECRET_KEY=another-secret-key
    expose:
      - 5000
    labels:
      - "traefik.http.services.reservation-api.loadbalancer.server.port=5000"
    depends_on:
      db:
        condition: service_started

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    depends_on:
      - api

volumes:
  postgres_data:
  uploads_data:
