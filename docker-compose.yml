services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: SaaS_Portfolio
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    restart: always

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=SaaS_Portfolio;Username=postgres;Password=supersecretpassword
      - ASPNETCORE_ENVIRONMENT=Production
    depends_on:
      db:
        condition: service_healthy
    labels:
      - "coolify.managed=true"

  reservation-api:
    build:
      context: ./Apps/ReserveLink
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://postgres:supersecretpassword@db:5432/reservation_db
      - JWT_SECRET_KEY=super-secret-key-change-it
      - SECRET_KEY=another-secret-key
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: ./Frontend/Dockerfile
    depends_on:
      - api

volumes:
  postgres_data:
  uploads_data:
